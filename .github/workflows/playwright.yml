name: Scrape Table Sums (23f3004254@ds.study.iitm.ac.in)

on: [push]  # Runs on every push to any branch

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install
          npx playwright install

      - name: Run Playwright Script 23f3004254@ds.study.iitm.ac.in
        run: node script.js
